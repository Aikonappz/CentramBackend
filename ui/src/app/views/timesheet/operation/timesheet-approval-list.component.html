<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Timesheets Approval
                        </div>
                        <div class="col-md-2 float-right">
                            <!-- <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="add()" *ngIf="hasPermission('WRITE')"
                                            href="javascript:void(0);">
                                            <i class="icon-plus"></i> Add
                                        </a>
                                    </li>
                                </ul>
                            </div> -->
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search TimeSheet
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">                                   
                                    <div class="col">
                                        <label class="form-col-form-label" for="projectId">Projects </label>
                                        <ng-select [items]="projects" placeholder="-- Select Project --"
                                            formControlName="projectId" id="projectId" name="projectId" bindLabel="label"
                                            bindValue="id">
                                        </ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="userId">Users </label>
                                        <ng-select [items]="userList" placeholder="-- Select Employee --"
                                            formControlName="userId" id="userId" name="userId" bindLabel="label"
                                            bindValue="id">
                                        </ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="date">Timesheet Date</label>
                                        <input type="date" format="DD-MM-YYYY" formControlName="date" id="date"
                                            name="date" class="form-control" placeholder="Timesheet Date"
                                            aria-label="Timesheet Date">
                                        <div *ngIf="f.date.touched && f.date.invalid" class="alert alert-danger-custom">
                                            <div *ngIf="f.date.errors?.required">
                                                Start Date is required.
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="pendingApproval">Timesheet Type</label>
                                        <ng-select [items]="types" placeholder="-- Select Timesheet Type --"
                                            formControlName="pendingApproval" id="pendingApproval"
                                            name="pendingApproval" bindLabel="label" bindValue="id">
                                        </ng-select>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="fromDate">
                            <th mat-header-cell *matHeaderCellDef> From Date </th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{formatDate(element.startDate)}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="toDate">
                            <th mat-header-cell *matHeaderCellDef> To Date </th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{formatDate(element.endDate)}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="user">
                            <th mat-header-cell *matHeaderCellDef> User </th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{(element.user?.firstName)}} {{(element.user?.lastName)}}</div>
                                <div>{{(element.user?.email)}}</div>
                                <div>{{(element.user?.employeeId)}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <a class="dropdown-item" (click)="edit(element)" *ngIf="hasPermission('APPROVE')&&element.approverCanTakeAction"
                                    href="javascript:void(0);">
                                    <i class="icon-pencil"></i>View
                                </a>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
