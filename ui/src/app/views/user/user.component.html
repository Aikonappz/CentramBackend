<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <strong>Users</strong>
                        </div>
                        <div class="col-md-2 float-right">
                            <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-upload"></i></button>
                            <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-download"></i></button>
                            <button type="button" class="btn btn-sm btn-link" (click)="addUser()"><i class="icon-plus"></i></button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="mat-elevation-z8">
                            <table mat-table [dataSource]="userVODatasource">
                                <ng-container matColumnDef="name">
                                    <th mat-header-cell *matHeaderCellDef> Name </th>
                                    <td mat-cell *matCellDef="let element">{{element.firstName}} {{element.lastName}}
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="contact">
                                    <th mat-header-cell *matHeaderCellDef> Contact Dtl. </th>
                                    <td mat-cell *matCellDef="let element">
                                        {{element.email}}<br />
                                        {{element.contactNo}}
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="department">
                                    <th mat-header-cell *matHeaderCellDef> Org. Dtl. </th>
                                    <td mat-cell *matCellDef="let element">
                                        {{element.employeeId}}<br />
                                        {{element.department}}<br />
                                        {{element.location}}<br />
                                        {{element.projectCode}}
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="status">
                                    <th mat-header-cell *matHeaderCellDef> Status </th>
                                    <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell *matCellDef="let element">
                                        {{element.status}}
                                    </td>
                                </ng-container>
                                <ng-container matColumnDef="action">
                                    <th mat-header-cell *matHeaderCellDef> Action </th>
                                    <td mat-cell *matCellDef="let element">
                                        <button type="button" class="btn btn-sm btn-link"><i
                                               (click)="updateStatus(element)" class="icon-ban"></i></button>
                                        <button type="button" (click)="editUser(element)" class="btn btn-sm btn-link"><i
                                                class="icon-pencil"></i></button>
                                    </td>
                                </ng-container>
                                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                                <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                                    [ngClass]="{gray: even}"></tr>
                            </table>
                            <mat-paginator [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10"></mat-paginator>
                        </div>

                    </div>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
