<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Users
                        </div>
                        <div class="col-md-2 float-right">
                            <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <li role="menuitem">
                                        <a *ngIf="hasPermission('WRITE')" class="dropdown-item"
                                            href="assets/downloads/users.csv"><i class="icon-arrow-up-circle"></i>
                                            Upload File Template</a>
                                    </li>
                                    <li role="menuitem">
                                        <a *ngIf="hasPermission('WRITE')" class="dropdown-item" (click)="upload()"
                                            href="javascript:void(0);">
                                            <i class="icon-cloud-upload"></i> Upload
                                        </a>
                                    </li>
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="download()" *ngIf="hasPermission('READ')"
                                            href="javascript:void(0);">
                                            <i class="icon-cloud-download"></i> Download
                                        </a>
                                    </li>
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="add()" *ngIf="hasPermission('WRITE')"
                                            href="javascript:void(0);">
                                            <i class="icon-plus"></i> Add
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div *ngIf="hasPermission('SEARCH')" class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search User
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-sm-3">
                                        <label class="form-col-form-label" for="userEmail">User Email</label>
                                        <input type="text" formControlName="userEmail" ngModel id="userEmail"
                                            name="userEmail" class="form-control" placeholder="User Email"
                                            aria-label="User Email">
                                    </div>
                                    <div class="col-sm-3">
                                        <label class="form-col-form-label" for="userEmployeeId">User Employee
                                            Id.</label>
                                        <input type="text" formControlName="userEmployeeId" ngModel id="userEmployeeId"
                                            name="userEmail" class="form-control" placeholder="User Employee Id."
                                            aria-label="User Employee Id.">
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-col-form-label " for="status">Status</label>
                                        <div class="col-md-9 col-form-label">
                                            <div class="form-check form-check-inline mr-1">
                                                <input class="form-check-input" type="radio" name="status" id="ALL"
                                                    [checked]="(usr.status == 'ALL')" #status
                                                    (change)="onChange( 'ALL')" checked="checked" value="ALL">
                                                <label class="form-check-label" for="ALL">All</label>
                                            </div>
                                            <div class="form-check form-check-inline mr-1" id="inline-radios">
                                                <input class="form-check-input" type="radio" name="status" id="ACTIVE"
                                                    [checked]="(usr.status == 'ACTIVE')" #status
                                                    (change)="onChange( 'ACTIVE')" value="ACTIVE">
                                                <label class="form-check-label" for="ACTIVE">Active</label>
                                            </div>
                                            <div class="form-check form-check-inline mr-1">
                                                <input class="form-check-input" type="radio" name="status" id="INACTIVE"
                                                    [checked]="(usr.status == 'INACTIVE')" #status
                                                    (change)="onChange( 'INACTIVE')" value="INACTIVE">
                                                <label class="form-check-label" for="INACTIVE">Inactive</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr *ngIf="hasPermission('SEARCH')" />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef> Name </th>
                            <td mat-cell *matCellDef="let element">{{element.firstName}} {{element.lastName}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="email">
                            <th mat-header-cell *matHeaderCellDef> Email </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.email}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="contact">
                            <th mat-header-cell *matHeaderCellDef> Contact </th>
                            <td mat-cell *matCellDef="let element">
                                <b>{{element.contactNo}}</b><br />
                                {{element.secContactNo}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell
                                *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <div class="btn-group" dropdown>
                                    <button dropdownToggle type="button"
                                        class="btn btn-primary dropdown-toggle">Actions<span
                                            class="caret"></span></button>
                                    <ul *dropdownMenu class="dropdown-menu" role="menu">
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="view(element)"
                                                *ngIf="hasPermission('READ')" href="javascript:void(0);">
                                                <i class="icon-eye"></i> View
                                            </a>
                                        </li>
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="updateStatus(element)"
                                                *ngIf="hasPermission('WRITE')" href="javascript:void(0);">
                                                <i class="icon-ban"></i> Change Status
                                            </a>
                                        </li>
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="edit(element)"
                                                *ngIf="hasPermission('WRITE')" href="javascript:void(0);">
                                                <i class="icon-pencil"></i>Edit
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10"></mat-paginator>
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
