<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Incidents
                        </div>
                        <div class="col-md-2 float-right">
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-upload"></i></button> -->
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-download"></i></button> -->
                            <button type="button" class="btn btn-sm btn-primary" (click)="add()"><i
                                    class="icon-plus"></i> Raise an Incident
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search Incident
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-col-form-label" for="title">Issue Title</label>
                                        <input type="text" formControlName="title" ngModel id="title" name="title"
                                            class="form-control" placeholder="Issue Title" aria-label="Issue Title">
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="status">Status</label>
                                        <select class="form-control" formControlName="status" ngModel id="status"
                                            name="status">
                                            <option>-- Select Incident Status--</option>
                                            <option *ngFor="let e of statusList" value="{{e}}">{{e}}</option>
                                        </select>
                                    </div>
                                    <div class="col">
                                    </div>
                                    <div class="col w-10 justify-content-around d-flex flex-column">
                                        <div>
                                            <button type="submit" class="btn btn-primary btn-sm">
                                                <i class="fa fa-search"></i> Search
                                            </button>
                                        </div>
                                        <div>
                                            <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                                <i class="fa fa-close"></i> Cancel
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <hr />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="title">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Title </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.title}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="priority">
                            <th class="w-5" mat-header-cell *matHeaderCellDef> Priority </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.priority.name}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="watchList">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Watch List </th>
                            <td [attr.data-label]="element.status" mat-cell *matCellDef="let element">
                                {{element.watchList.join(', ')}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="raisedAt">
                            <th class="w-15" mat-header-cell *matHeaderCellDef> Raised At </th>
                            <td mat-cell *matCellDef="let element">
                                {{formatDateTime(element.raisedAt)}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="slaAt">
                            <th class="w-15" mat-header-cell *matHeaderCellDef> SLA. At </th>
                            <td mat-cell *matCellDef="let element">
                                {{formatDateTime(element.slaAt)}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th class="w-10" mat-header-cell *matHeaderCellDef> Status </th>
                            <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell
                                *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-10" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <!-- <button type="button" class="btn btn-sm btn-primary" (click)="updateStatus(element)"><i
                                        class="icon-ban"></i> Change Status
                                </button> -->
                                <button type="button" class="btn btn-sm btn-primary" (click)="edit(element)"><i
                                        class="fa fa-comments-o"></i> Note
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
