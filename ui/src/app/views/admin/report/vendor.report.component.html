                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef> Vendor Name </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.name}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="conDtl">
                            <th mat-header-cell *matHeaderCellDef> Contact Person Details </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.contactName}}<br />
                                {{element.contactEmail}}<br />
                                {{element.contactNumber}}<br />
                                {{element.contactAddress}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
