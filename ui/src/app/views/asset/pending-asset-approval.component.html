<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Pending Approval
                        </div>
                        <!-- <div class="col-md-2 float-right">
                            <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="add()" *ngIf="hasPermission('WRITE')"
                                            href="javascript:void(0);">
                                            <i class="icon-plus"></i> Order an Asset
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div> -->
                    </div>
                </div>
                <div class="card-body">
                    <div *ngIf="hasPermission('SEARCH')" class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search Pending Approval
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-col-form-label" for="orderNo">Asset Req. Number</label>
                                        <input type="text" formControlName="orderNo" id="orderNo" name="orderNo"
                                            class="form-control" placeholder="Asset Req. Number"
                                            aria-label="Order Number">
                                    </div>
                                    <div class="col"></div>
                                    <div class="col"></div>
                                    <div class="col"></div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr *ngIf="hasPermission('SEARCH')" />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="orderFor">
                            <th mat-header-cell *matHeaderCellDef>Asset Req. Details</th>
                            <td mat-cell *matCellDef="let element">
                                <span [ngClass]="{
                                    'badge':true
                                    }">{{element.incidentNo}}</span><br />
                                {{element.moduleName}}<br />
                                {{element.subModuleName}}<br />
                                {{element.title}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="assetDtl">
                            <th mat-header-cell *matHeaderCellDef>Requested Date</th>
                            <td mat-cell *matCellDef="let element">
                                {{formatDateTime(element.createdDate)}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <div class="btn-group" dropdown>
                                    <button dropdownToggle type="button"
                                        class="btn btn-primary dropdown-toggle">Actions<span
                                            class="caret"></span></button>
                                    <ul *dropdownMenu class="dropdown-menu" role="menu">
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="view(element)"
                                                *ngIf="element.feedbackProvided == true" href="javascript:void(0);">
                                                <i class="icon-eye"></i> View
                                            </a>
                                        </li>
                                        <li role="menuitem">
                                            <a class="dropdown-item" [routerLink]="['/asset/approval/'+element.id]"
                                                *ngIf="element.feedbackProvided == false" href="javascript:void(0);">
                                                <i class="cil-life-ring"></i>Action
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
