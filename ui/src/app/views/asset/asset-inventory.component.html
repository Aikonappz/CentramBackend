<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Assets Inventory
                        </div>
                        <div class="col-md-2 float-right">
                            <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <!-- <li role="menuitem">
                                        <a *ngIf="hasPermission('WRITE')" class="dropdown-item"
                                            href="assets/downloads/assets.csv"><i class="icon-arrow-up-circle"></i>
                                            Upload(Template)</a>
                                    </li>
                                    <li role="menuitem">
                                        <a *ngIf="hasPermission('WRITE')" class="dropdown-item" (click)="upload()"
                                            href="javascript:void(0);">
                                            <i class="icon-cloud-upload"></i> Upload
                                        </a>
                                    </li> -->
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="download()" *ngIf="hasPermission('READ')"
                                            href="javascript:void(0);">
                                            <i class="icon-cloud-download"></i> Download
                                        </a>
                                    </li>
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="add()" *ngIf="hasPermission('WRITE')"
                                            href="javascript:void(0);">
                                            <i class="icon-plus"></i> Add an Asset
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div *ngIf="hasPermission('SEARCH')" class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search Assets
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-col-form-label" for="productCategory">Product
                                            Category</label>
                                        <ng-select [items]="productTypes" #productCategory
                                            (change)="populateChildValues($event)"
                                            placeholder="-- Select Product Category --" formControlName="productCategory"
                                            id="productCategory" name="productCategory" bindLabel="label"
                                            bindValue="id"></ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="assetType">Asset
                                            Category
                                        </label>
                                        <ng-select [items]="assetList" placeholder="-- Select Asset Category --"
                                            formControlName="assetType" id="assetType" name="assetType"
                                            bindLabel="label" bindValue="id"></ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="modelNo">Model</label>
                                        <input type="text" formControlName="modelNo" placeholder="Model No."
                                            id="modelNo" name="modelNo" class="form-control">
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="serialNumber">Serial No</label>
                                        <input type="text" formControlName="serialNumber" placeholder="Serial No."
                                            id="serialNumber" name="serialNumber" class="form-control">
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label" for="available">Available?</label>
                                        <ng-select [items]="booleanList" placeholder="-- Select --"
                                            formControlName="available" id="available" name="available"
                                            bindLabel="label" bindValue="id"></ng-select>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr *ngIf="hasPermission('SEARCH')" />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="productType">
                            <th mat-header-cell *matHeaderCellDef>Product Category</th>
                            <td mat-cell *matCellDef="let element">
                                {{element.productCategory}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="serialNo">
                            <th mat-header-cell *matHeaderCellDef>Serial No.</th>
                            <td mat-cell *matCellDef="let element">
                                <span [ngClass]="{'badge':true}">{{element.serialNo}}</span>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="assetType">
                            <th mat-header-cell *matHeaderCellDef>Asset Category</th>
                            <td mat-cell *matCellDef="let element">
                                Asset Category : {{element.assetType}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="available">
                            <th mat-header-cell *matHeaderCellDef>Availability Status</th>
                            <td mat-cell *matCellDef="let element">
                                {{element.isAvailable==true? 'YES' : 'NO'}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <div class="btn-group" dropdown>
                                    <button dropdownToggle type="button"
                                        class="btn btn-primary dropdown-toggle">Actions<span
                                            class="caret"></span></button>
                                    <ul *dropdownMenu class="dropdown-menu" role="menu">
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="view(element)"
                                                *ngIf="hasPermission('READ')" href="javascript:void(0);">
                                                <i class="icon-eye"></i> View
                                            </a>
                                        </li>
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="edit(element)"
                                                *ngIf="hasPermission('WRITE')" href="javascript:void(0);">
                                                <i class="icon-pencil"></i>Edit
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
