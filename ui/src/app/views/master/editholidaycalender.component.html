<div class="animated fadeIn">
  <div class="row">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header" *ngIf="newEntity">
          <strong>Add Holiday Calendar</strong>
        </div>
        <div class="card-header" *ngIf="!newEntity">
          <strong>Edit Holiday Calendar</strong>
        </div>
        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
          <div class="card-body">
            <div class="row">
              <div class="col">
                <label class="form-col-form-label required-control-label" for="location">Location</label>
                <ng-select [items]="locations" placeholder="-- Select Location --" formControlName="location"
                  id="location" name="location" bindLabel="name" bindValue="id"></ng-select>
                <div *ngIf="f.location.touched && f.location.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.location.errors?.required">
                    Location is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="year">Calendar Year</label>
                <ng-select [items]="yearList" placeholder="-- Select Location --" formControlName="year"
                  id="year" name="year" bindLabel="label" bindValue="id"></ng-select>
                <div *ngIf="f.year.touched && f.year.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.year.errors?.required">
                    Calendar Year is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="fileInput">Upload File</label>
                <input (change)="getFileDetails($event)" type="file" id="fileInput" formControlName="fileInput"
                  name="fileInput">
                <div *ngIf="f.fileInput.touched && f.fileInput.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.fileInput.errors?.required">
                    File is required.
                  </div>
                  <div *ngIf="f.fileInput.errors?.mustBeCSVFile">
                    File should be CSV.
                  </div>
                  <div *ngIf="f.fileInput.errors?.mustBeLessThan2MB">
                    File should be less than 3 MB.
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <button *ngIf="hasPermission('WRITE')" [disabled]="!angForm.valid" type="submit"
              class="btn btn-primary">Save</button>
            <button class="btn btn-secondary" (click)="goBack()" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    <!--/.col-->
  </div>
</div>
