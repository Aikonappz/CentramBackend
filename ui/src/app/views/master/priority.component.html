<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-11">
                            <i class="fa fa-align-justify"></i> Priorities
                        </div>
                        <div class="col-md-1 float-right">
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-upload"></i></button> -->
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-download"></i></button> -->
                            <button *ngIf="hasPermission('WRITE')" type="button" class="btn btn-sm btn-primary"
                                (click)="add()"><i class="icon-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef> Priority Name </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.name}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="description">
                            <th mat-header-cell *matHeaderCellDef> Priority Desc. </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.description}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="sla">
                            <th mat-header-cell *matHeaderCellDef> Priority SLA. </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.sla}} hrs
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell
                                *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <button *ngIf="hasPermission('WRITE')" type="button" class="btn btn-sm btn-primary"
                                    (click)="updateStatus(element)"><i class="icon-ban"></i> Change Status
                                </button>
                                <button *ngIf="hasPermission('WRITE')" type="button" class="btn btn-sm btn-primary"
                                    (click)="edit(element)"><i class="icon-pencil"></i> Edit
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
