<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-9">
                            <i class="fa fa-align-justify"></i> Holiday Calenders
                        </div>
                        <div class="col-md-3 float-right">
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-upload"></i></button> -->
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-download"></i></button> -->
                            <a *ngIf="hasPermission('WRITE')" href="assets/downloads/holiday-callender.csv"
                                class="btn btn-sm btn-warning btn-minimize"><i class="icon-arrow-up-circle"></i> Sample
                                Upload File</a>
                            <button type="button" *ngIf="hasPermission('WRITE')" class="btn btn-sm btn-primary"
                                (click)="add()"><i class="icon-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="year">
                            <th mat-header-cell *matHeaderCellDef> Calender Year </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.year}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <!-- <button type="button" class="btn btn-sm btn-primary" (click)="updateStatus(element)"><i
                                        class="icon-ban"></i> Change Status
                                </button> -->
                                <button type="button" *ngIf="hasPermission('READ')" (click)="download(element)"
                                    class=" btn btn-sm btn-primary btn-minimize"><i class="icon-cloud-download"></i>
                                    Download</button>
                                <button *ngIf="hasPermission('WRITE')" type="button" class="btn btn-sm btn-primary"
                                    (click)="edit(element)"><i class="icon-pencil"></i> Edit
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
