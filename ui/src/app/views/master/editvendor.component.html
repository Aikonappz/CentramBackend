<div class="animated fadeIn">
  <div class="row">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header" *ngIf="newEntity">
          <strong>Add Vendor</strong>
        </div>
        <div class="card-header" *ngIf="!newEntity">
          <strong>Edit Vendor</strong>
        </div>
        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
          <div class="card-body">
            <div class="row">
              <div class="col">
                <label class="form-col-form-label required-control-label" for="dlModuleId">Category</label>
                <select #dlModuleId (change)="populateSubmodule($event.target.value)" class="form-control"
                  formControlName="dlModuleId" ngModel id="dlModuleId" name="dlModuleId">
                  <option value="">-- Select Category --</option>
                  <option *ngFor="let e of moduleList" value="{{e.id}}">{{e.customerModuleName}}</option>
                </select>
                <div *ngIf="f.dlModuleId.touched && f.dlModuleId.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.dlModuleId.errors?.required">
                    Category is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="dlSubModuleId">Sub Category</label>
                <select multiple class="form-control" formControlName="dlSubModuleId" ngModel id="dlSubModuleId"
                  name="dlSubModuleId">
                  <option *ngFor="let e of subModuleList" value="{{e.id}}">{{e.customerModuleName}}
                  </option>
                </select>
                <div *ngIf="f.dlSubModuleId.touched && f.dlSubModuleId.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.dlSubModuleId.errors?.required">
                    Sub Category is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="name">Vendor Name</label>
                <input type="text" formControlName="name" ngModel id="name" name="name" class="form-control"
                  placeholder="Vendor Name" aria-label="Vendor Name">
                <div *ngIf="f.name.touched && f.name.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.name.errors?.required">
                    Vendor Name is required.
                  </div>
                  <div *ngIf="f.name.errors?.maxlength">
                    Allowed maxlength exceeds.
                  </div>
                </div>
              </div>
            </div>
            <div class="row row-margin-05">
              <div class="col">
                <label class="col-md-3 col-form-label" for="status">Status</label>
                <div class="col-md-9 col-form-label">
                  <div class="form-check form-check-inline mr-1" id="inline-radios">
                    <input class="form-check-input" type="radio" #active (change)="onChange(true, 'ACTIVE')"
                      name="status" id="ACTIVE" [checked]="(vendor.status == 'ACTIVE')" value="true">
                    <label class="form-check-label" for="ACTIVE">Active</label>
                  </div>
                  <div class="form-check form-check-inline mr-1">
                    <input class="form-check-input" type="radio" name="status" id="INACTIVE"
                      [checked]="(vendor.status == 'INACTIVE')" #inactive (change)="onChange(false, 'INACTIVE')"
                      value="false">
                    <label class="form-check-label" for="INACTIVE">Inactive</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <button *ngIf="hasPermission('WRITE')" [disabled]="!angForm.valid" type="submit"
              class="btn btn-primary">Save</button>
            <button class="btn btn-secondary" (click)="goBack()" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    <!--/.col-->
  </div>
</div>
