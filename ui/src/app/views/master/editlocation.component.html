<div class="animated fadeIn">
  <div class="row">
    <div class="col-sm-12">
      <div class="card">
        <div class="card-header" *ngIf="newEntity">
          <strong>Add Location</strong>
        </div>
        <div class="card-header" *ngIf="!newEntity">
          <strong>Edit Location</strong>
        </div>
        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
          <div class="card-body">
            <div class="row">
              <div class="col">
                <label class="form-col-form-label required-control-label" for="country">Country</label>
                <select #country (change)="populateTimezone($event.target.value)" class="form-control"
                  formControlName="country" ngModel id="country" name="country">
                  <option value="">-- Select Country --</option>
                  <option *ngFor="let e of countries" value="{{e.country_name}}">{{e.country_code}} -
                    {{e.country_name}}
                  </option>
                </select>
                <div *ngIf="f.country.touched && f.country.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.country.errors?.required">
                    Country is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="timezone">Timezone</label>
                <select class="form-control" formControlName="timezone" ngModel id="timezone" name="timezone">
                  <option value="">-- Select Timezone --</option>
                  <option *ngFor="let e of filterdCountry" value="{{e.zone_name}}">{{e.zone_name}}
                  </option>
                </select>
                <div *ngIf="f.timezone.touched && f.timezone.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.timezone.errors?.required">
                    Timezone is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label" for="state">State</label>
                <input type="text" formControlName="state" ngModel id="state" name="state" class="form-control"
                  placeholder="State" aria-label="State">
                <div *ngIf="f.state.touched && f.state.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.state.errors?.maxlength">
                    Allowed maxlength exceeds.
                  </div>
                </div>
              </div>
            </div>
            <div class="row row-margin-05">
              <div class="col">
                <label class="form-col-form-label " for="city">City</label>
                <input type="text" formControlName="city" ngModel id="city" name="city" class="form-control"
                  placeholder="City" aria-label="City">
                <div *ngIf="f.city.touched && f.city.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.city.errors?.maxlength">
                    Allowed maxlength exceeds.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="name">Location</label>
                <input type="text" formControlName="name" ngModel id="name" name="name" class="form-control"
                  placeholder="Name" aria-label="Name">
                <div *ngIf="f.name.touched && f.name.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.name.errors?.required">
                    Location Name is required.
                  </div>
                  <div *ngIf="f.name.errors?.maxlength">
                    Allowed maxlength exceeds.
                  </div>
                </div>
              </div>
              <div class="col"></div>
            </div>
            <div class="row row-margin-05">
              <div class="col">
                <label class="form-col-form-label required-control-label" for="opsStartTime">Ops. Start Time</label>
                <select class="form-control" formControlName="opsStartTime" ngModel id="opsStartTime"
                  name="opsStartTime">
                  <option value="">-- Ops. Start Time --</option>
                  <option *ngFor="let e of timeList" value="{{e}}">{{e}}</option>
                </select>
                <div *ngIf="f.opsStartTime.touched && f.opsStartTime.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.opsStartTime.errors?.required">
                    Ops. Start Time is required.
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="form-col-form-label required-control-label" for="opsEndTime">Ops. End Time</label>
                <select class="form-control" formControlName="opsEndTime" ngModel id="opsEndTime" name="opsEndTime">
                  <option value="">-- Ops. End Time --</option>
                  <option *ngFor="let e of timeList" value="{{e}}">{{e}}</option>
                </select>
                <div *ngIf="f.opsEndTime.touched && f.opsEndTime.invalid" class="alert alert-danger-custom">
                  <div *ngIf="f.opsEndTime.errors?.required">
                    Ops. End Time is required.
                  </div>
                  <div *ngIf="f.opsEndTime.errors?.mustGreaterThanStartTime">
                    End time should be greater than Start time!
                  </div>
                </div>
              </div>
              <div class="col">
                <label class="col-md-3 col-form-label" for="status">Status</label>
                <div class="col-md-9 col-form-label">
                  <div class="form-check form-check-inline mr-1" id="inline-radios">
                    <input class="form-check-input" type="radio" #active (change)="onChange(true, 'ACTIVE')"
                      name="status" id="ACTIVE" [checked]="(loc.status == 'ACTIVE')" value="true">
                    <label class="form-check-label" for="ACTIVE">ACTIVE</label>
                  </div>
                  <div class="form-check form-check-inline mr-1">
                    <input class="form-check-input" type="radio" name="status" id="INACTIVE"
                      [checked]="(loc.status == 'INACTIVE')" #inactive (change)="onChange(false, 'INACTIVE')"
                      value="false">
                    <label class="form-check-label" for="INACTIVE">INACTIVE</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <button *ngIf="hasPermission('WRITE')" [disabled]="!angForm.valid" type="submit" class="btn btn-primary">Save</button>
            <button class="btn btn-secondary" (click)="goBack()" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    <!--/.col-->
  </div>
</div>
