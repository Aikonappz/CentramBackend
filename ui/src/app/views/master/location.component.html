<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-11">
                            <i class="fa fa-align-justify"></i> Locations
                        </div>
                        <div class="col-md-1 float-right">
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-upload"></i></button> -->
                            <!-- <button type="button" class="btn btn-sm btn-minimize"><i
                                    class="icon-cloud-download"></i></button> -->
                            <button type="button" class="btn btn-sm btn-primary" (click)="add()"><i
                                    class="icon-plus"></i> Add
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="country">
                            <th mat-header-cell *matHeaderCellDef> Country </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.country}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="state">
                            <th mat-header-cell *matHeaderCellDef> State </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.state}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="city">
                            <th mat-header-cell *matHeaderCellDef> City </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.city}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="timezone">
                            <th mat-header-cell *matHeaderCellDef> Timezone </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.timezone}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="name">
                            <th mat-header-cell *matHeaderCellDef> Location </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.name}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell
                                *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <button type="button" class="btn btn-sm btn-primary" (click)="updateStatus(element)"><i
                                        class="icon-ban"></i> Change Status
                                </button>
                                <button type="button" class="btn btn-sm btn-primary" (click)="edit(element)"><i
                                        class="icon-pencil"></i> Edit
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
