<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> UAT Report
                        </div>
                        <div class="col-md-2 float-right">
                            <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="download()" *ngIf="hasPermission('READ')"
                                            href="javascript:void(0);">
                                            <i class="icon-cloud-download"></i> Download
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div *ngIf="hasPermission('SEARCH')" class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i> Search UAT Report
                        </div>
                        <form [formGroup]="uatCommunicationSearchForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchTechnology">Technology</label>
                                        <ng-select #searchTechnology (change)="populateSearchModule($event)"
                                            [items]="technologyList" placeholder="-- Select Technology --"
                                            formControlName="searchTechnology" id="searchTechnology" searchTechnology
                                            name="searchTechnology" bindLabel="value" bindValue="key">
                                        </ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchModuleId">Module</label>
                                        <ng-select #searchModuleId (change)="populateSearchSubmodule($event)"
                                            [items]="moduleList" placeholder="-- Select Module --"
                                            formControlName="searchModuleId" id="searchModuleId" searchModuleId
                                            name="searchModuleId" bindLabel="customerModuleName" bindValue="id">
                                        </ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchSubModuleId">Sub
                                            Module</label>
                                        <ng-select [items]="searchSubModuleList" #searchSubModuleId
                                            (change)="populateSearchProject($event)"
                                            placeholder="-- Select Sub Module --" formControlName="searchSubModuleId"
                                            id="searchSubModuleId" searchSubModuleId name="searchSubModuleId"
                                            bindLabel="customerModuleName" bindValue="id"></ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchProject">Project</label>
                                        <ng-select [items]="projectList" #searchProject
                                            (change)="populateProjectUat($event)" placeholder="-- Select Project --"
                                            formControlName="searchProject" id="searchProject" searchProject
                                            name="searchProject" bindLabel="label" bindValue="id">
                                        </ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchUatProjectId">UAT File</label>
                                        <ng-select [items]="projectUats" #searchUatProjectId
                                            (change)="populateProjectUATScript($event)"
                                            placeholder="-- Select Project UAT --" formControlName="searchUatProjectId"
                                            id="searchUatProjectId" searchUatProjectId name="searchUatProjectId"
                                            bindLabel="label" bindValue="id"></ng-select>
                                    </div>
                                    <div class="col">
                                        <label class="form-col-form-label " for="searchUatProjectScriptId">UAT
                                            Script</label>
                                        <ng-select [items]="projectUatScriptList" #searchUatProjectScriptId
                                            (change)="searchUatCommunication($event)"
                                            placeholder="-- Select Project UAT Script --"
                                            formControlName="searchUatProjectScriptId" id="searchUatProjectScriptId"
                                            searchUatProjectScriptId name="searchUatProjectScriptId" bindLabel="label"
                                            bindValue="id"></ng-select>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr *ngIf="hasPermission('SEARCH')" />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="project">
                            <th mat-header-cell *matHeaderCellDef>Project Name</th>
                            <td mat-cell *matCellDef="let element">
                                <!-- <div>{{element.projectName}} [{{element.projectCode}}]</div> -->
                                <div>{{element.projectName}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="technology">
                            <th mat-header-cell *matHeaderCellDef>Technology</th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{element.technology}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="module">
                            <th mat-header-cell *matHeaderCellDef>Module</th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{element.module}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="subModule">
                            <th mat-header-cell *matHeaderCellDef>Sub Module</th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{element.subModule}}</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="actionDetails">
                            <th mat-header-cell *matHeaderCellDef>Script Detail</th>
                            <td mat-cell *matCellDef="let element">
                                {{element.customerUserEmail}} - {{element.scriptName}}
                            </td>
                          </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef>Status</th>
                            <td mat-cell *matCellDef="let element">
                                <span [ngClass]="{
                                    'badge-closed': element.status =='Completed',                      
                                    'badge-sla-breached': element.status =='Not Started',   
                                    'badge-sla-about-to-breach' : element.status =='In Progress',                     
                                    'badge':true
                                    }">{{element.status}}</span>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
