<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-10">
                            <i class="fa fa-align-justify"></i> Projects
                        </div>
                        <div class="col-md-2 float-right">
                            <div class="btn-group d-flex justify-content-between" dropdown>
                                <button dropdownToggle type="button" class="btn btn-danger dropdown-toggle">Actions<span
                                        class="caret"></span></button>
                                <ul *dropdownMenu class="dropdown-menu" role="menu">
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="add()" *ngIf="hasPermission('WRITE')"
                                            href="javascript:void(0);">
                                            <i class="icon-plus"></i> Add
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="projectDetail">
                            <th mat-header-cell *matHeaderCellDef> Project Type </th>
                            <td mat-cell *matCellDef="let element">
                                <div>{{element.projectType}}</div>
                                <div>{{element.technology}}</div>
                                <div>{{element.moduleName}}/{{element.subModuleName}}</div>
                                <div>{{element.name}} [ {{element.code}}]</div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="managers">
                            <th mat-header-cell *matHeaderCellDef> Managers </th>
                            <td mat-cell *matCellDef="let element">
                                <div [innerHtml]="format(element.watchList)"></div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="stakeHolders">
                            <th mat-header-cell *matHeaderCellDef> Customers </th>
                            <td mat-cell *matCellDef="let element">
                                <div [innerHtml]="format(element.stakeHolders)"></div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="consultants">
                            <th mat-header-cell *matHeaderCellDef> Consultants </th>
                            <td mat-cell *matCellDef="let element">
                                <div [innerHtml]="format(element.consultants)"></div>
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="action">
                            <th class="w-20" mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <div class="btn-group" dropdown>
                                    <button dropdownToggle type="button"
                                        class="btn btn-primary dropdown-toggle">Actions<span
                                            class="caret"></span></button>
                                    <ul *dropdownMenu class="dropdown-menu" role="menu">
                                        <li role="menuitem">
                                            <a class="dropdown-item" (click)="edit(element)"
                                                *ngIf="hasPermission('WRITE')" href="javascript:void(0);">
                                                <i class="icon-pencil"></i>Edit
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator showFirstLastButtons [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10">
                    </mat-paginator>
                    <!--/.row-->
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
