<div class="animated fadeIn">
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header ">
                    <div class="row">
                        <div class="col-md-7">
                            <i class="fa fa-align-justify"></i> Notifications
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="card ">
                        <div class="card-header">
                            <i class="fa fa-search"></i>Search Notifications
                        </div>
                        <form [formGroup]="angForm" (ngSubmit)="formSubmit()" novalidate>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col">
                                        <label class="form-col-form-label" for="searchValue">Search Value</label>
                                        <textarea id="searchValue" rows="4" class="form-control textarea-non-resizable"
                                            formControlName="searchValue" id="searchValue" name="searchValue"
                                            placeholder="Search Value..."></textarea>
                                    </div>
                                    <div class="col"></div>
                                    <div class="col"></div>
                                </div>
                            </div>
                            <div class="card-footer">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fa fa-search"></i> Search
                                </button>
                                <button type="button" (click)="loadPage()" class="btn btn-danger btn-sm">
                                    <i class="fa fa-close"></i> Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                    <hr />
                    <table mat-table [dataSource]="datasource">
                        <ng-container matColumnDef="notificationTitle">
                            <th mat-header-cell *matHeaderCellDef> Title </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.notificationTitle}}
                            </td>
                        </ng-container>
                        <ng-container matColumnDef="notificationBody">
                            <th mat-header-cell *matHeaderCellDef> Body </th>
                            <td mat-cell *matCellDef="let element">
                                <div [innerHTML]="(element.notificationBody.length>75)? (element.notificationBody |
                                    slice:0:75)+'...':(element.notificationBody ) "></div>
                            </td>
                        </ng-container>
                        <!-- <ng-container matColumnDef="notificationType">
                            <th mat-header-cell *matHeaderCellDef> Type </th>
                            <td mat-cell *matCellDef="let element">
                                {{element.notificationType}}
                            </td>
                        </ng-container> -->
                        <!-- <ng-container matColumnDef="status">
                            <th mat-header-cell *matHeaderCellDef> Status </th>
                            <td [attr.data-label]="element.status" id="id-status-{{element.id}}" mat-cell
                                *matCellDef="let element">
                                {{element.status}}
                            </td>
                        </ng-container> -->
                        <ng-container matColumnDef="action">
                            <th mat-header-cell *matHeaderCellDef> Action </th>
                            <td mat-cell *matCellDef="let element">
                                <button [disabled]="entityId==element.id" type="button" (click)="view(element.id)"
                                    class="btn btn-sm btn-primary"><i class="icon-view"></i> View
                                </button>
                            </td>
                        </ng-container>
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; let even = even; columns: displayedColumns;"
                            [ngClass]="{gray: even}"></tr>
                        <tr class="mat-row" *matNoDataRow>
                            <td class="mat-cell" align="center" colspan="9999">
                                No data found!
                            </td>
                        </tr>
                    </table>
                    <mat-paginator [pageSizeOptions]="[ 10, 25, 100]" [pageSize]="10"></mat-paginator>
                </div>
                <!--/.row-->
            </div>
        </div>
    </div>
    <!--/.col-->
</div>
<!--/.row-->
