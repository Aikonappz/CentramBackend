spring:
  application:
    name: erp-registry
  main:
    banner-mode: "off"

server:
  port: 8761

eureka:
  client:
    registerWithEureka: false
    fetchRegistry: false
    server:
      waitTimeInMsWhenSyncEmpty: 0
      enableSelfPreservation: false
    service-url:
      defaultZone:  http://${eureka.instance.hostname}:${server.port}/eureka/
  instance:
    hostname: "localhost"

management:
  endpoint:
    shutdown:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"