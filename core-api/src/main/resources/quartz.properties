#quartz
org.quartz.scheduler.skipUpdateCheck=false
org.quartz.scheduler.instanceName=centram-batch
org.quartz.scheduler.instanceId=AUTO
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
org.quartz.scheduler.jobFactory.class=org.quartz.simpl.SimpleJobFactory
org.quartz.threadPool.threadCount=25
org.quartz.threadPool.threadPriority=1
org.quartz.jobStore.misfireThreshold=60000
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.useProperties=false
org.quartz.jobStore.tablePrefix=QRTZ_
org.quartz.jobStore.isClustered=false
org.quartz.jobStore.clusterCheckinInterval=20000
org.quartz.jobStore.dataSource=dS
org.quartz.dataSource.dS.driver=org.hibernate.dialect.MySQL55Dialect
org.quartz.dataSource.dS.maxConnections=5
org.quartz.dataSource.dS.validationQuery=SELECT 1
org.quartz.dataSource.dS.URL=jdbc:mysql://localhost:3306/centram?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false
org.quartz.dataSource.dS.user=root
org.quartz.dataSource.dS.password=sam_coder
org.quartz.job-store-type=jdbc
org.quartz.jdbc.initialize-schema=always